apiVersion: v1
kind: ConfigMap
metadata:
  name: console-logo
  namespace: openshift-config
data:
  console-logo.gif: :23:32
  
---

apiVersion: operator.openshift.io/v1
kind: Console
metadata:
  name: cluster
spec:
  customization:
    customLogoFile:
      key: console-logo.gif
      name: console-logo
    customProductName: My Console
