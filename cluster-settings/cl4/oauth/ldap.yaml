apiVersion: config.openshift.io/v1
kind: OAuth
  name: cluster
spec:
  identityProviders:
  - ldap:
      attributes:
        email:
        - mail
        id:
        - dn
        name:
        - cn
        preferredUsername:
        - uid
      bindDN: cn=admin,dc=mylab,dc=local
      bindPassword:
        name: ldap-secret
      insecure: true
      url: ldap://ldap.mylab.local/ou=Users,dc=mylab,dc=local?uid
    mappingMethod: claim
    name: ldap
    type: LDAP
  - htpasswd:
      fileData:
        name: htpass-secret
    mappingMethod: claim
    name: htpasswd_provider
    type: HTPasswd
