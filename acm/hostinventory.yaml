kind: Secret
apiVersion: v1
metadata:
  name: pullsecret-myhi
  namespace: myhi
data:
  '.dockerconfigjson': ''
type: 'kubernetes.io/dockerconfigjson'
---
apiVersion: agent-install.openshift.io/v1beta1
kind: InfraEnv
metadata:
  name: myhi
  namespace: myhi
  labels:
    agentclusterinstalls.extensions.hive.openshift.io/location: Dubai
    networkType: dhcp
spec:
  agentLabels:
    'agentclusterinstalls.extensions.hive.openshift.io/location': Dubai
  pullSecretRef:
    name: pullsecret-myhi
  sshAuthorizedKey: ssh-rsa  amr@lt.mylab.local
  nmStateConfigLabelSelector:	
      matchLabels:	
        infraenvs.agent-install.openshift.io: myhi
  cpuArchitecture: x86_64
status:
  agentLabelSelector:
    matchLabels:
      'agentclusterinstalls.extensions.hive.openshift.io/location': Dubai
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: capi-provider-role
  namespace: myhi
rules:
  - verbs:
      - '*'
    apiGroups:
      - agent-install.openshift.io
    resources:
      - agents
